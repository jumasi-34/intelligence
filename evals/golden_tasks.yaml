version: 1
description: "Golden benchmark tasks for the GoEQ BI AI harness."
metrics:
  - agent_success_rate
  - verification_pass_rate
  - rollback_required_rate
  - high_risk_detection_rate
  - reviewer_false_negative_rate
  - test_writer_coverage_improvement
thresholds:
  agent_success_rate_min: 0.80
  verification_pass_rate_min: 0.95
  high_risk_detection_rate_min: 0.95
  reviewer_false_negative_rate_max: 0.05
  rollback_required_rate_max: 0.10
  test_writer_coverage_improvement_min: 0.05
merge_policy:
  low: "Required checks pass."
  medium: "Required checks pass and reviewer confirmation is checked."
  high: "Required checks pass, human approval is checked, and rollback plan is verified."
risk_label_policy:
  low:
    - risk-low
  medium:
    - risk-medium
    - reviewer-required
  high:
    - risk-high
    - approval-required
    - rollback-plan-required
tasks:
  - id: cqms_quality_issue_flow
    domain: cqms
    agent: specialist-cqms-quality
    test: tests/golden/test_cqms_flow.py
    required_context:
      - intelligence/guide/agent-common.md
      - intelligence/guide/3layer-development-process.md
      - intelligence/guide/testing-verification.md
      - intelligence/domain/domain-knowledge.md
    expected_artifacts:
      - task.md
      - context-manifest.yaml
      - plan.md
      - diff.patch
      - test.log
      - review.md
      - risk.md
  - id: gmes_factory_metrics_flow
    domain: gmes
    agent: specialist-gmes-factory
    test: tests/golden/test_gmes_flow.py
    required_context:
      - intelligence/guide/agent-common.md
      - intelligence/guide/3layer-development-process.md
      - intelligence/guide/testing-verification.md
      - intelligence/domain/domain-knowledge.md
    expected_artifacts:
      - task.md
      - context-manifest.yaml
      - plan.md
      - diff.patch
      - test.log
      - review.md
      - risk.md
  - id: iqm_dashboard_flow
    domain: iqm
    agent: specialist-iqm-executive
    test: tests/golden/test_iqm_dashboard_flow.py
    required_context:
      - intelligence/guide/agent-common.md
      - intelligence/guide/3layer-development-process.md
      - intelligence/guide/testing-verification.md
      - intelligence/domain/domain-knowledge.md
    expected_artifacts:
      - task.md
      - context-manifest.yaml
      - plan.md
      - diff.patch
      - test.log
      - review.md
      - risk.md
  - id: qrs_action_flow
    domain: qrs
    agent: specialist-qrs-action
    test: tests/golden/test_qrs_action_flow.py
    required_context:
      - intelligence/guide/agent-common.md
      - intelligence/guide/3layer-development-process.md
      - intelligence/guide/testing-verification.md
      - intelligence/domain/domain-knowledge.md
    expected_artifacts:
      - task.md
      - context-manifest.yaml
      - plan.md
      - diff.patch
      - test.log
      - review.md
      - risk.md
